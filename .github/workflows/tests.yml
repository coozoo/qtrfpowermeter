name: Tests

on:
  push:
  pull_request:

jobs:
  check-skip:
    runs-on: ubuntu-latest
    steps:
      - name: Check commit message
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "Skipping workflow"
            exit 1
          fi

  unit-tests:
    name: Unit tests (Qt6 on ubuntu-latest)
    runs-on: ubuntu-latest
    needs: check-skip
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Qt 6 + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6serialport6-dev \
            libgl1-mesa-dev \
            libssl-dev \
            zlib1g-dev

      - name: Shadow build of the tests aggregator
        run: |
          mkdir -p build/Desktopqt6-Tests
          cd build/Desktopqt6-Tests
          qmake6 ../../tests/tests.pro CONFIG+=debug
          make -j$(nproc)

      - name: Run unit tests
        working-directory: build/Desktopqt6-Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: make check
